<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hackathon Management System Main Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3e5f5; }
        .card { border: none; border-radius: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-custom { background-color: #7b1fa2; color: white; }
        .btn-custom:hover { background-color: #4a0072; color: white; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-5" style="color: #4a0072;">🏆 Hackathon Management System</h1>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="event : ${events}">
            <div class="card shadow h-100">
                <div class="card-body text-center">
                    <h5 class="card-title text-primary" th:text="${event.name}">Event Name</h5>

                    <span class="badge bg-success mb-2" th:text="${event.eventStatus}">Status</span>

                    <p class="text-muted" th:text="${event.description}">Desc</p>
                    <p>📍 <span th:text="${event.location}">Loc</span></p>

                    <a th:href="@{'/event/' + ${event.hackeventId}}" class="btn btn-custom w-100">
                        View Details & Standings
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
