<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Evaluate Submission</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f3e5f5; }
    .user-badge {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #fff;
      padding: 8px 20px;
      border-radius: 25px;
      font-weight: bold;
      color: #4a0072;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      border: 1px solid #e1bee7;
      transition: all 0.3s ease;
    }
  </style>
</head>
<body>

<div id="currentUserBadge" class="user-badge">
  🔒 Status: Waiting for Login...
</div>

<div class="container mt-5">
  <div class="card shadow p-4 mx-auto" style="max-width: 700px; border-radius: 15px;">
    <h2 class="text-center mb-4" style="color: #4a0072;">⚖️ Judge Evaluation</h2>

    <div class="alert alert-light border shadow-sm">
      <h4 class="text-primary mb-3" th:text="${submission.projectName}">Project Name</h4>

      <div class="row mb-2">
        <div class="col-md-4 text-muted">Team:</div>
        <div class="col-md-8 fw-bold" th:text="${submission.team.teamName}">Team Name</div>
      </div>

      <div class="row mb-2">
        <div class="col-md-4 text-muted">Project Link:</div>
        <div class="col-md-8">
          <a th:href="${submission.projectLink}" target="_blank" class="text-decoration-none">
            🔗 <span th:text="${submission.projectLink}">Link</span>
          </a>
        </div>
      </div>

      <div class="row mb-2" th:if="${submission.toolUsages != null and !submission.toolUsages.empty}">
        <div class="col-md-4 text-muted">Tools Used:</div>
        <div class="col-md-8">
                    <span th:each="usage : ${submission.toolUsages}"
                          class="badge bg-info text-dark me-1">
                          <span th:text="${usage.tool.toolName}">Java</span>
                          <span th:text="'(v' + ${usage.version} + ')'">v1.0</span>
                    </span>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 text-muted">Current Avg:</div>
        <div class="col-md-8">
          <span class="badge bg-warning text-dark fs-6" th:text="${submission.averageScore}">50.0</span>
        </div>
      </div>
    </div>

    <form action="/evaluate" method="post" class="mt-4">
      <input type="hidden" name="submissionId" th:value="${submission.submissionId}">

      <div class="mb-3">
        <label class="form-label fw-bold" style="color: #d32f2f;">Select Identity :</label>
        <select id="judgeSelect" name="judgeId" class="form-select border-danger" required onchange="updateBadge()">
          <option value="" selected disabled>-- Select Your Name --</option>
          <option th:each="judge : ${judges}"
                  th:value="${judge.userId}"
                  th:text="'👤 ' + ${judge.name} + ' ' + ${judge.surname} + ' (Judge)'">
            Eva Brown
          </option>
        </select>
        <div class="form-text">Changing user updates the session badge above.</div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Numeric Score (0-100):</label>
        <input type="number" name="score" class="form-control form-control-lg" min="0" max="100" required placeholder="Enter score...">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Written Feedback:</label>
        <textarea name="feedback" class="form-control" rows="4" placeholder="Write your comments..."></textarea>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success btn-lg">✅ Submit Evaluation</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  function updateBadge() {

    var select = document.getElementById("judgeSelect");

    var selectedText = select.options[select.selectedIndex].text;


    var badge = document.getElementById("currentUserBadge");
    badge.style.backgroundColor = "#e1bee7";
    badge.innerText = "Logged in as: " + selectedText;

    setTimeout(function() {
      badge.style.backgroundColor = "#fff";
    }, 300);
  }
</script>

</body>
</html>
